global:
  scrape_interval: 60s
  evaluation_interval: 60s

scrape_configs:
  # HTTP probe — uptime, response time, SSL expiry
  # Add your target URLs below
  - job_name: 'blackbox_http'
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets:
          - https://your-service-1.example.com
          - https://your-service-2.example.com
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: kenari-blackbox:9115
