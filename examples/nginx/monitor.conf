server {
    listen 80;
    server_name monitor.yourdomain.com;
    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl;
    server_name monitor.yourdomain.com;

    ssl_certificate     /etc/letsencrypt/live/monitor.yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/monitor.yourdomain.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    # Kenari auth check subrequest
    location = /_auth {
        internal;
        proxy_pass http://kenari-gateway:3000/api/auth/check;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header Cookie $http_cookie;
    }

    location @login {
        return 302 https://monitor.yourdomain.com/login;
    }

    # Uptime Kuma Socket.IO
    location /uptime/socket.io/ {
        auth_request /_auth;
        error_page 401 = @login;
        proxy_pass http://kenari-kuma:3001/uptime/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Uptime Kuma UI
    location /uptime/ {
        auth_request /_auth;
        error_page 401 = @login;
        proxy_pass http://kenari-kuma:3001/uptime/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location = /uptime { return 301 /uptime/; }

    # Grafana WebSocket (Grafana Live)
    location /grafana/api/live/ {
        auth_request /_auth;
        error_page 401 = @login;
        proxy_pass http://kenari-grafana:3000/grafana/api/live/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-WEBAUTH-USER "admin";
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Grafana UI
    location /grafana/ {
        auth_request /_auth;
        error_page 401 = @login;
        proxy_pass http://kenari-grafana:3000/grafana/;
        proxy_set_header Host $host;
        proxy_set_header X-WEBAUTH-USER "admin";
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /grafana { return 301 /grafana/; }

    # Kenari gateway — everything else
    location / {
        proxy_pass http://kenari-gateway:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
