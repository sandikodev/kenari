<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="8" fill="#f59e0b"/>
  <!-- body -->
  <ellipse cx="16" cy="19" rx="7" ry="6" fill="#fff"/>
  <!-- head -->
  <circle cx="20" cy="12" r="5" fill="#fff"/>
  <!-- eye -->
  <circle cx="22" cy="11" r="1.2" fill="#1a1a1a"/>
  <!-- beak -->
  <polygon points="25,12 28,13 25,14" fill="#f59e0b"/>
  <!-- wing -->
  <ellipse cx="13" cy="18" rx="4" ry="2.5" fill="#fcd34d" transform="rotate(-20 13 18)"/>
  <!-- tail -->
  <polygon points="9,22 6,25 10,24" fill="#fcd34d"/>
</svg>
