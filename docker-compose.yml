name: kenari

services:
  gateway:
    image: kenari:latest
    container_name: kenari-gateway
    restart: unless-stopped
    env_file: .env.production
    volumes:
      - gateway-data:/app/data
    depends_on: [kuma]
    networks: [proxy-net, internal-net]
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }

  kuma:
    image: louislam/uptime-kuma:1
    container_name: kenari-kuma
    restart: unless-stopped
    volumes:
      - kuma-data:/app/data
    networks: [internal-net]

volumes:
  gateway-data:
  kuma-data:

networks:
  proxy-net:
    external: true   # your reverse proxy network (nginx-proxy, traefik, etc.)
  internal-net:
    driver: bridge
