name: Release CLI

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            name: kenari-linux-x86_64
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            name: kenari-linux-arm64
          - target: armv7-unknown-linux-musleabihf
            os: ubuntu-latest
            name: kenari-linux-armv7
          - target: x86_64-apple-darwin
            os: macos-latest
            name: kenari-macos-x86_64
          - target: aarch64-apple-darwin
            os: macos-latest
            name: kenari-macos-arm64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            name: kenari-windows-x86_64.exe

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compile tools (Linux musl)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -q
          sudo apt-get install -y musl-tools
          # ARM cross-compiler
          if [[ "${{ matrix.target }}" == "aarch64-unknown-linux-musl" ]]; then
            sudo apt-get install -y gcc-aarch64-linux-gnu
          fi
          if [[ "${{ matrix.target }}" == "armv7-unknown-linux-musleabihf" ]]; then
            sudo apt-get install -y gcc-arm-linux-gnueabihf
          fi

      - name: Build
        working-directory: cli
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename binary (Unix)
        if: runner.os != 'Windows'
        run: |
          cp cli/target/${{ matrix.target }}/release/kenari ${{ matrix.name }}
          chmod +x ${{ matrix.name }}

      - name: Rename binary (Windows)
        if: runner.os == 'Windows'
        run: |
          cp cli/target/${{ matrix.target }}/release/kenari.exe ${{ matrix.name }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.name }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum * > checksums.txt
          cat checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/*
          body: |
            ## Kenari CLI ${{ github.ref_name }}

            ### Installation

            **Linux/macOS (one-liner):**
            ```bash
            curl -fsSL https://raw.githubusercontent.com/sandikodev/kenari/main/scripts/install-cli.sh | sh
            ```

            **Manual download:**
            | Platform | File |
            |----------|------|
            | Linux x86_64 | `kenari-linux-x86_64` |
            | Linux ARM64 | `kenari-linux-arm64` |
            | Linux ARMv7 | `kenari-linux-armv7` |
            | macOS x86_64 | `kenari-macos-x86_64` |
            | macOS ARM64 (Apple Silicon) | `kenari-macos-arm64` |
            | Windows x86_64 | `kenari-windows-x86_64.exe` |

            Verify with `checksums.txt`.
