name: Release CLI

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            name: kenari-linux-x86_64
            use_cross: false

          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            name: kenari-linux-arm64
            use_cross: true

          - target: armv7-unknown-linux-musleabihf
            os: ubuntu-latest
            name: kenari-linux-armv7
            use_cross: true

          - target: x86_64-apple-darwin
            os: macos-latest
            name: kenari-macos-x86_64
            use_cross: false

          - target: aarch64-apple-darwin
            os: macos-latest
            name: kenari-macos-arm64
            use_cross: false

          - target: x86_64-pc-windows-msvc
            os: windows-latest
            name: kenari-windows-x86_64.exe
            use_cross: false

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl tools (x86_64)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get install -y musl-tools

      - name: Install cross
        if: matrix.use_cross == true
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build (cross)
        if: matrix.use_cross == true
        working-directory: cli
        run: cross build --release --target ${{ matrix.target }}

      - name: Build (native)
        if: matrix.use_cross == false
        working-directory: cli
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename binary (Unix)
        if: runner.os != 'Windows'
        run: |
          cp cli/target/${{ matrix.target }}/release/kenari ${{ matrix.name }}
          chmod +x ${{ matrix.name }}

      - name: Rename binary (Windows)
        if: runner.os == 'Windows'
        run: cp cli/target/${{ matrix.target }}/release/kenari.exe ${{ matrix.name }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.name }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum * > checksums.txt
          cat checksums.txt

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          body: |
            ## Kenari CLI ${{ github.ref_name }}

            ### Installation

            **Linux/macOS (one-liner):**
            ```bash
            curl -fsSL https://raw.githubusercontent.com/sandikodev/kenari/main/scripts/install-cli.sh | sh
            ```

            **Manual download:**
            | Platform | File |
            |----------|------|
            | Linux x86_64 | `kenari-linux-x86_64` |
            | Linux ARM64 | `kenari-linux-arm64` |
            | Linux ARMv7 | `kenari-linux-armv7` |
            | macOS x86_64 | `kenari-macos-x86_64` |
            | macOS ARM64 (Apple Silicon) | `kenari-macos-arm64` |
            | Windows x86_64 | `kenari-windows-x86_64.exe` |

            Verify integrity with `checksums.txt`.
